<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub</title>
    <style>
        :root {
            --bg-primary: #0f0f12;
            --bg-secondary: #16161a;
            --bg-card: #1f1f24;
            --accent: #ff66b2;
            --text-main: #f5f5f7;
            --text-muted: #8e8e93;
            --border: #2c2c35;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            line-height: 1.6;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            margin-left: 1.5rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .section {
            margin-bottom: 4rem;
        }

        .section h2 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 1rem;
            transition: transform 0.2s, border-color 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .card-header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        .audio-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .play-btn {
            background-color: var(--accent);
            color: var(--bg-primary);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, opacity 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .play-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .track-timeline {
            flex-grow: 1;
            height: 6px;
            background-color: var(--border);
            border-radius: 3px;
            position: relative;
            cursor: pointer;
        }

        .track-progress {
            height: 100%;
            width: 0%;
            background-color: var(--accent);
            border-radius: 3px;
            position: absolute;
            top: 0;
            left: 0;
        }

        .empty-state, .coming-soon-card {
            background-color: var(--bg-secondary);
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 3rem;
            text-align: center;
            color: var(--text-muted);
        }

        .coming-soon-card {
            border-style: solid;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .coming-soon-card h3 {
            color: var(--text-main);
        }

        .badge {
            background-color: rgba(255, 102, 178, 0.15);
            color: var(--accent);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .genre-tag {
            background-color: var(--border);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-main);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Hub</div>
        <div class="nav-links">
            <a href="#addons">Addons</a>
            <a href="#music">Music</a>
            <a href="#vrc-api">VRC API</a>
        </div>
    </nav>

    <main class="container">
        <section id="addons" class="section">
            <h2>Addons</h2>
            <div class="empty-state">
                <p>No addons available at the moment. Check back later!</p>
            </div>
        </section>

        <section id="music" class="section">
            <h2>Music Production</h2>
            <div id="music-grid" class="grid"></div>
        </section>

        <section id="vrc-api" class="section">
            <h2>VRC API</h2>
            <div class="coming-soon-card">
                <h3>Integration Under Development</h3>
                <p>The VRChat API implementation is currently being engineered. Stay tuned for live asset metrics and real-time endpoints.</p>
                <span class="badge">Coming Soon</span>
            </div>
        </section>
    </main>

    <script src="./music-data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const musicGrid = document.getElementById('music-grid');
            const library = window.musicLibrary;
            
            if (!library || library.length === 0) {
                musicGrid.innerHTML = '<p style="color: var(--text-muted); padding: 1rem;">No tracks currently loaded.</p>';
                return;
            }

            let currentlyPlayingAudio = null;
            let currentlyPlayingBtn = null;

            library.forEach(track => {
                const card = document.createElement('div');
                card.className = 'card';
                
                const audio = new Audio(track.audioUrl);
                audio.preload = "metadata";

                card.innerHTML = `
                    <div class="card-header">
                        <span class="genre-tag">${track.genre}</span>
                    </div>
                    <h3>${track.title}</h3>
                    <div class="audio-controls">
                        <button class="play-btn">
                            <svg class="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </button>
                        <div class="track-timeline">
                            <div class="track-progress"></div>
                        </div>
                    </div>
                `;
                
                const playBtn = card.querySelector('.play-btn');
                const progress = card.querySelector('.track-progress');
                const timeline = card.querySelector('.track-timeline');
                const svgContainer = playBtn.querySelector('svg');

                const playIcon = '<path d="M8 5v14l11-7z"/>';
                const pauseIcon = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';

                playBtn.addEventListener('click', () => {
                    if (currentlyPlayingAudio && currentlyPlayingAudio !== audio) {
                        currentlyPlayingAudio.pause();
                        currentlyPlayingBtn.querySelector('svg').innerHTML = playIcon;
                    }

                    if (audio.paused) {
                        audio.play();
                        svgContainer.innerHTML = pauseIcon;
                        currentlyPlayingAudio = audio;
                        currentlyPlayingBtn = playBtn;
                    } else {
                        audio.pause();
                        svgContainer.innerHTML = playIcon;
                        currentlyPlayingAudio = null;
                        currentlyPlayingBtn = null;
                    }
                });

                audio.addEventListener('timeupdate', () => {
                    const percentage = (audio.currentTime / audio.duration) * 100;
                    progress.style.width = percentage + '%';
                });

                audio.addEventListener('ended', () => {
                    svgContainer.innerHTML = playIcon;
                    progress.style.width = '0%';
                    currentlyPlayingAudio = null;
                    currentlyPlayingBtn = null;
                });

                timeline.addEventListener('click', (e) => {
                    const timelineWidth = timeline.clientWidth;
                    const clickX = e.offsetX;
                    const duration = audio.duration;
                    if (duration) {
                        audio.currentTime = (clickX / timelineWidth) * duration;
                    }
                });

                musicGrid.appendChild(card);
            });
        });
    </script>
</body>
</html>
