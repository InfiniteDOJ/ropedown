<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub</title>
    <style>
        :root {
            --bg-primary: #0f0f12;
            --bg-secondary: #16161a;
            --bg-card: #1f1f24;
            --accent: #ff66b2;
            --text-main: #f5f5f7;
            --text-muted: #8e8e93;
            --border: #2c2c35;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            line-height: 1.6;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            margin-left: 1.5rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .section {
            margin-bottom: 4rem;
        }

        .section h2 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 1rem;
            transition: transform 0.2s, border-color 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .card-header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        audio {
            width: 100%;
            margin-top: 0.5rem;
            border-radius: 8px;
        }

        .empty-state, .coming-soon-card {
            background-color: var(--bg-secondary);
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 3rem;
            text-align: center;
            color: var(--text-muted);
        }

        .coming-soon-card {
            border-style: solid;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .coming-soon-card h3 {
            color: var(--text-main);
        }

        .badge {
            background-color: rgba(255, 102, 178, 0.15);
            color: var(--accent);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .genre-tag {
            background-color: var(--border);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-main);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Hub</div>
        <div class="nav-links">
            <a href="#addons">Addons</a>
            <a href="#music">Music</a>
            <a href="#vrc-api">VRC API</a>
        </div>
    </nav>

    <main class="container">
        <section id="addons" class="section">
            <h2>Addons</h2>
            <div class="empty-state">
                <p>No addons available at the moment. Check back later!</p>
            </div>
        </section>

        <section id="music" class="section">
            <h2>Music Production</h2>
            <div id="music-grid" class="grid"></div>
        </section>

        <section id="vrc-api" class="section">
            <h2>VRC API</h2>
            <div class="coming-soon-card">
                <h3>Integration Under Development</h3>
                <p>The VRChat API implementation is currently being engineered. Stay tuned for live asset metrics and real-time endpoints.</p>
                <span class="badge">Coming Soon</span>
            </div>
        </section>
    </main>

    <script src="./music-data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const musicGrid = document.getElementById('music-grid');
            const library = window.musicLibrary;
            
            if (!library || library.length === 0) {
                musicGrid.innerHTML = '<p style="color: var(--text-muted); padding: 1rem;">No tracks currently loaded.</p>';
                return;
            }

            library.forEach(track => {
                const card = document.createElement('div');
                card.className = 'card';
                
                card.innerHTML = `
                    <div class="card-header">
                        <span class="genre-tag">${track.genre}</span>
                    </div>
                    <h3>${track.title}</h3>
                    <audio controls preload="metadata">
                        <source src="${track.audioUrl}" type="audio/mpeg">
                        Your browser does not support the audio element.
                    </audio>
                `;
                
                musicGrid.appendChild(card);
            });
        });
    </script>
</body>
</html>
